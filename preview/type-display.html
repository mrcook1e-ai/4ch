<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-weight:500;background:#0a0a0a;padding:32px;display:flex;flex-direction:column;gap:8px}
.specimen{display:flex;align-items:baseline;gap:24px;padding:8px 0;border-bottom:0.5px solid rgba(255,255,255,0.05)}
.specimen:last-child{border-bottom:none}
.meta{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#333;min-width:160px;padding-top:4px}
.sample{font-family:'Unbounded',sans-serif;color:#fff;white-space:nowrap}
.row-label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:#444;font-family:'Unbounded',sans-serif;margin-bottom:8px}
</style></head><body>
<div class="row-label">Unbounded — Display Type</div>
<div class="specimen">
  <span class="meta">Black 900 · Hero</span>
  <span class="sample" style="font-size:56px;font-weight:900;line-height:0.95;letter-spacing:-0.02em">4ch</span>
</div>
<div class="specimen">
  <span class="meta">Black 900 · Display</span>
  <span class="sample" style="font-size:40px;font-weight:900;line-height:1;letter-spacing:-0.02em">Свои среди</span>
</div>
<div class="specimen">
  <span class="meta">Bold 700 · Section</span>
  <span class="sample" style="font-size:28px;font-weight:700;line-height:1.05;letter-spacing:-0.02em">Три кита сервера</span>
</div>
<div class="specimen">
  <span class="meta">Bold 700 · H3</span>
  <span class="sample" style="font-size:16px;font-weight:700;line-height:1.2;letter-spacing:-0.01em">Свободный треп</span>
</div>
<div class="specimen">
  <span class="meta">Bold 700 · Stat Num</span>
  <span class="sample" style="font-size:28px;font-weight:700;letter-spacing:-0.02em;color:#97BF04">4.2K</span>
</div>
<div class="specimen">
  <span class="meta">Bold 700 · Button</span>
  <span class="sample" style="font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase">Присоединиться</span>
</div>
<div class="specimen">
  <span class="meta">Medium 400 · Eyebrow</span>
  <span class="sample" style="font-size:11px;font-weight:400;letter-spacing:0.18em;text-transform:uppercase;color:#97BF04">Discord Community</span>
</div>
</body></html>
