<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;font-family:'Inter',sans-serif;font-weight:500;padding:28px 32px}
.row{display:flex;gap:8px;margin-bottom:16px}
.swatch{flex:1;border-radius:8px;padding:14px 12px;display:flex;flex-direction:column;justify-content:flex-end;gap:4px}
.swatch-name{font-size:10px;font-family:'Unbounded',sans-serif;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
.swatch-val{font-size:10px;letter-spacing:0.04em;opacity:0.6}
.label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#444;font-family:'Unbounded',sans-serif;margin-bottom:8px}
</style></head><body>

<div class="label">Brand</div>
<div class="row" style="margin-bottom:20px">
  <div class="swatch" style="background:#97BF04;height:80px">
    <div class="swatch-name" style="color:#0a0a0a">Brand</div>
    <div class="swatch-val" style="color:#0a0a0a">#97BF04</div>
  </div>
  <div class="swatch" style="background:#6e8e03;height:80px">
    <div class="swatch-name" style="color:#0a0a0a">Brand Dim</div>
    <div class="swatch-val" style="color:#0a0a0a">#6e8e03</div>
  </div>
  <div class="swatch" style="background:rgba(151,191,4,0.18);height:80px;border:0.5px solid rgba(151,191,4,0.25)">
    <div class="swatch-name" style="color:#97BF04">Brand Glow</div>
    <div class="swatch-val" style="color:#97BF04">rgba(151,191,4,.18)</div>
  </div>
  <div class="swatch" style="background:rgba(151,191,4,0.08);height:80px;border:0.5px solid rgba(151,191,4,0.15)">
    <div class="swatch-name" style="color:#6e8e03">Brand Glow Sm</div>
    <div class="swatch-val" style="color:#6e8e03">rgba(151,191,4,.08)</div>
  </div>
</div>

<div class="label">Backgrounds</div>
<div class="row">
  <div class="swatch" style="background:#000000;height:56px;border:0.5px solid rgba(255,255,255,0.07)">
    <div class="swatch-name" style="color:#444">True Black</div>
    <div class="swatch-val" style="color:#333">#000000</div>
  </div>
  <div class="swatch" style="background:#0a0a0a;height:56px;border:0.5px solid rgba(255,255,255,0.07)">
    <div class="swatch-name" style="color:#555">BG Base</div>
    <div class="swatch-val" style="color:#444">#0a0a0a</div>
  </div>
  <div class="swatch" style="background:#0d0d0d;height:56px;border:0.5px solid rgba(255,255,255,0.07)">
    <div class="swatch-name" style="color:#555">Surface 1</div>
    <div class="swatch-val" style="color:#444">#0d0d0d</div>
  </div>
  <div class="swatch" style="background:#111111;height:56px;border:0.5px solid rgba(255,255,255,0.07)">
    <div class="swatch-name" style="color:#666">Surface 2</div>
    <div class="swatch-val" style="color:#555">#111111</div>
  </div>
  <div class="swatch" style="background:#181818;height:56px;border:0.5px solid rgba(255,255,255,0.07)">
    <div class="swatch-name" style="color:#777">Surface 3</div>
    <div class="swatch-val" style="color:#666">#181818</div>
  </div>
  <div class="swatch" style="background:#202020;height:56px;border:0.5px solid rgba(255,255,255,0.07)">
    <div class="swatch-name" style="color:#888">Surface 4</div>
    <div class="swatch-val" style="color:#777">#202020</div>
  </div>
</div>

</body></html>
