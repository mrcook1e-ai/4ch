<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;font-family:'Inter',sans-serif;padding:28px 32px;display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:baseline;gap:20px;padding:10px 0;border-bottom:0.5px solid rgba(255,255,255,0.05)}
.row:last-child{border-bottom:none}
.name{font-size:10px;font-family:'Unbounded',sans-serif;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#333;min-width:110px}
.sample{font-family:'Inter',sans-serif;font-weight:500;font-size:15px;flex:1}
.val{font-size:10px;letter-spacing:0.04em;color:#333;min-width:80px;text-align:right}
.row-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#444;font-family:'Unbounded',sans-serif}
</style></head><body>
<div class="row-label" style="margin-bottom:4px">Text Colors</div>
<div class="row"><span class="name">White</span><span class="sample" style="color:#fff;font-weight:700">Свои среди своих</span><span class="val" style="color:#555">#ffffff</span></div>
<div class="row"><span class="name">Text</span><span class="sample" style="color:#f0f0f0">Свои среди своих</span><span class="val" style="color:#555">#f0f0f0</span></div>
<div class="row"><span class="name">Muted</span><span class="sample" style="color:#666">Свои среди своих</span><span class="val" style="color:#555">#666666</span></div>
<div class="row"><span class="name">Dim</span><span class="sample" style="color:#3d3d3d">Свои среди своих</span><span class="val" style="color:#555">#3d3d3d</span></div>
<div class="row"><span class="name">Brand</span><span class="sample" style="color:#97BF04">Свои среди своих</span><span class="val" style="color:#555">#97BF04</span></div>
</body></html>
